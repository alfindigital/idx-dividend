name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Periksa integritas data
        run: npm run check-data
      - name: Unit test (logika turunan)
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
